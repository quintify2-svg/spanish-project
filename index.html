<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proyecto — Progresivo (presente y pasado)</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.94);
      --accent: #1a6b4a;
      --text: #1a1a1a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text);
      background: #0d3d2a;
    }

    .scroll-stage {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      height: 100vh;
    }

    .scroll-stage::-webkit-scrollbar {
      height: 10px;
    }

    .scroll-stage::-webkit-scrollbar-track {
      background: #0a2e20;
    }

    .scroll-stage::-webkit-scrollbar-thumb {
      background: #3d9b6e;
      border-radius: 5px;
    }

    .slide {
      position: relative;
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .slide-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .hotspots {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .person {
      pointer-events: auto;
      position: absolute;
      --person-scale: 1;
      --person-rot: 0deg;
      transform: translate(-50%, -50%) rotate(var(--person-rot)) scale(var(--person-scale));
      min-width: 2.25rem;
      min-height: 2.25rem;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: rgba(26, 107, 74, 0.55);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.32);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      font-size: 1.25rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      outline: none;
    }

    .person:focus,
    .person:focus-visible {
      outline: none;
    }

    .person:has(img) {
      border: none !important;
      border-radius: 0;
      background: transparent !important;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.26);
    }

    .person img {
      width: 100%;
      height: 100%;
      min-width: 2.25rem;
      min-height: 2.25rem;
      object-fit: cover;
      display: block;
      border-radius: 0;
      pointer-events: none;
    }

    .person:hover,
    .person:focus-visible {
      transform: translate(-50%, -50%) rotate(var(--person-rot)) scale(calc(var(--person-scale) * 1.06));
      background: rgba(26, 107, 74, 0.75);
      outline: none;
      box-shadow: 0 5px 16px rgba(0, 0, 0, 0.36);
    }

    .person:has(img):hover,
    .person:has(img):focus-visible {
      background: transparent;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.34);
    }

    .person[aria-pressed="true"] {
      background: rgba(212, 168, 75, 0.85);
      border-color: #fff8e7;
    }

    .person:has(img)[aria-pressed="true"] {
      background: transparent !important;
      border: none !important;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.38);
    }

    #sentence-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 15;
      max-height: 42vh;
      overflow-y: auto;
      padding: 1rem 1rem 1.25rem;
      background: var(--panel-bg);
      border-top: 3px solid var(--accent);
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.12);
      transform: translateY(100%);
      transition: transform 0.28s ease;
    }

    #sentence-panel.is-open {
      transform: translateY(0);
    }

    #sentence-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: var(--accent);
    }

    #sentence-panel .row {
      margin: 0.75rem 0 0;
      line-height: 1.55;
    }

    #text-sentence {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #text-sentence .sentence-line {
      margin: 0;
      padding: 0 0 1rem;
      border-bottom: 1px solid #d8e5df;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    #text-sentence .sentence-line:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    #sentence-panel .close {
      position: absolute;
      top: 0.5rem;
      right: 0.65rem;
      border: none;
      background: transparent;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      color: #444;
      padding: 0.25rem 0.5rem;
    }

    #sentence-panel .close:hover {
      color: #000;
    }
  </style>
</head>
<body>
  <div class="scroll-stage" role="region" aria-label="Escenas panorámicas">
    <!-- Slide 1: road (left) -->
    <section class="slide" aria-label="Escena 1: carretera" data-slide-index="0" data-slide-name="carretera">
      <img class="slide-bg" src="assets/bg-1-road.png" width="1920" height="1080" alt="Ilustración de una carretera en perspectiva con árboles y cielo">
      <div class="hotspots">
        <button type="button" class="person" style="left:58%; top:56.1%; --person-scale:0.5; --person-rot:0deg" data-sentence="Yo estoy en el carro con mi familia. Mi mamá estaba buscando las llaves cuando salimos de la casa. Mi papá está manejando. Mi hermana estaba mirando por la ventana." aria-label="Familia en el carro"><img src="assets/Copilot_20260326_014426-removebg-preview.png" alt=""></button>
      </div>
    </section>

    <!-- Slide 2: meadow with path -->
    <section class="slide" aria-label="Escena 2: prado y sendero" data-slide-index="1" data-slide-name="prado">
      <img class="slide-bg" src="assets/bg-2-meadow.png" width="1920" height="1080" alt="Prado con sendero, flores y un banco de parque">
      <div class="hotspots">
        <button type="button" class="person" style="left:24.7%; top:59.4%; --person-scale:0.6; --person-rot:0deg" data-sentence="Nosotros estamos viendo niños jugando en el parque. Ellos estaban caminando por el parque cuando vieron un perro." aria-label="Niños en el parque"><img src="assets/Copilot_20260326_080405-removebg-preview.png" alt=""></button>
        <button type="button" class="person" style="left:54.7%; top:56%; --person-scale:0.45; --person-rot:0deg" data-sentence="Ella está caminando conmigo hacia la entrada de la piscina" aria-label="Caminando hacia la piscina"><img src="assets/Copilot_20260326_080915-removebg-preview.png" alt=""></button>
      </div>
    </section>

    <!-- Slide 3: pool -->
    <section class="slide" aria-label="Escena 3: piscina y jardín" data-slide-index="2" data-slide-name="piscina">
      <img class="slide-bg" src="assets/bg-3-pool.png" width="1920" height="1080" alt="Jardín con piscina, sombrilla y césped">
      <div class="hotspots">
        <button type="button" class="person" style="left:11.6%; top:72.1%; --person-scale:0.9; --person-rot:0deg" data-sentence="Un hombre estaba trabajando cerca de la entrada cuando llegamos." aria-label="Hombre trabajando cerca de la entrada"><img src="assets/Copilot_20260326_082506-removebg-preview.png" alt=""></button>
        <button type="button" class="person" style="left:38.3%; top:72.1%; --person-scale:0.7; --person-rot:0deg" data-sentence="Yo estoy corriendo hacia el agua porque quiero nadar. Yo estaba nadando cuando mi familia me llamó." aria-label="Corriendo hacia el agua"><img src="assets/Copilot_20260326_083435-removebg-preview.png" alt=""></button>
        <button type="button" class="person" style="left:62.9%; top:52.6%; --person-scale:0.6; --person-rot:0deg" data-sentence="Mi papá estaba hablando con mi mamá cuando yo salté al agua. Mi papá estaba mirando alrededor cuando encontró su botella de agua." aria-label="Papá cerca de la piscina"><img src="assets/Copilot_20260326_084704-removebg-preview.png" alt=""></button>
        <button type="button" class="person" style="left:79.1%; top:62.2%; --person-scale:1; --person-rot:0deg" data-sentence="Mi mamá está acostada cerca del agua." aria-label="Mamá cerca del agua"><img src="assets/Copilot_20260326_085734-removebg-preview.png" alt=""></button>
        <button type="button" class="person" style="left:67%; top:74.1%; --person-scale:0.75; --person-rot:0deg" data-sentence="Mi hermana está entrando al agua conmigo. Mi hermana estaba nadando cuando se cansó." aria-label="Hermana en el agua"><img src="assets/Copilot_20260326_090534-removebg-preview.png" alt=""></button>
      </div>
    </section>
  </div>

  <aside id="sentence-panel" aria-labelledby="panel-heading" hidden>
    <button type="button" class="close" id="panel-close" aria-label="Cerrar">&times;</button>
    <h2 id="panel-heading">Oración</h2>
    <div class="row" id="sentence-block"><div id="text-sentence"></div></div>
  </aside>

  <script>
    (function () {
      function imageCandidates(src) {
        if (!src || src.indexOf('data:') === 0 || /^(https?:)?\/\//i.test(src)) {
          return [src];
        }
        var clean = src.replace(/^\.\//, '');
        var name = clean.replace(/^.*\//, '');
        var out = [];
        function add(u) {
          if (u && out.indexOf(u) === -1) out.push(u);
        }
        add(src);
        add(clean);
        add('./' + clean);
        add('assets/' + name);
        add('Assets/' + name);
        add('ASSETS/' + name);
        add('./assets/' + name);
        add('./Assets/' + name);
        add('images/' + name);
        add('./images/' + name);
        add('img/' + name);
        add('./img/' + name);
        add(name);
        add('./' + name);
        return out;
      }

      function attachImageFallback(img) {
        var initial = img.getAttribute('src');
        if (!initial) return;
        var list = imageCandidates(initial);
        if (list.length <= 1) return;
        var idx = 0;
        function onImgErr() {
          idx += 1;
          if (idx < list.length) {
            img.src = list[idx];
          } else {
            img.removeEventListener('error', onImgErr);
          }
        }
        img.addEventListener('error', onImgErr);
      }

      document.querySelectorAll('img[src]').forEach(attachImageFallback);
    })();

    (function () {
      var panel = document.getElementById('sentence-panel');
      var sentenceEl = document.getElementById('text-sentence');
      var closeBtn = document.getElementById('panel-close');

      function allPersonButtons() {
        return document.querySelectorAll('.hotspots .person');
      }

      function personSentence(btn) {
        var s = btn.getAttribute('data-sentence');
        if (s != null && s !== '') return s;
        var legacy = btn.getAttribute('data-present') || '';
        var legPast = btn.getAttribute('data-past') || '';
        if (legPast) return legacy + (legacy ? '\n\n' : '') + legPast;
        return legacy;
      }

      function splitAfterTerminals(single) {
        var parts = [];
        var cur = '';
        for (var i = 0; i < single.length; i++) {
          cur += single[i];
          var ch = single[i];
          if (ch === '.' || ch === '!' || ch === '?') {
            var j = i + 1;
            while (j < single.length && single[j] === '.') {
              cur += single[j];
              j++;
            }
            i = j - 1;
            var rest = single.slice(j);
            if (rest.length === 0 || /^\s/.test(rest)) {
              if (cur.trim()) parts.push(cur.trim());
              cur = '';
              while (i + 1 < single.length && /\s/.test(single[i + 1])) i++;
            }
          }
        }
        if (cur.trim()) parts.push(cur.trim());
        return parts.filter(Boolean);
      }

      function splitIntoDisplaySentences(text) {
        var t = String(text == null ? '' : text).replace(/\r\n/g, '\n').trim();
        if (!t) return [];
        var byPara = t.split(/\n\s*\n/).map(function (x) {
          return x.replace(/\s+/g, ' ').trim();
        }).filter(Boolean);
        if (byPara.length > 1) return byPara;
        var single = byPara[0] || t.replace(/\s+/g, ' ').trim();
        var byStop = splitAfterTerminals(single);
        if (byStop.length > 1) return byStop;
        var byMi = single.split(/\s+(?=Mi\s+\S)/i).map(function (x) {
          return x.trim();
        }).filter(Boolean);
        if (byMi.length > 1) return byMi;
        return [single];
      }

      function openPanel(sentence) {
        sentenceEl.textContent = '';
        splitIntoDisplaySentences(sentence).forEach(function (chunk) {
          var line = document.createElement('p');
          line.className = 'sentence-line';
          line.textContent = chunk;
          sentenceEl.appendChild(line);
        });
        panel.hidden = false;
        requestAnimationFrame(function () {
          panel.classList.add('is-open');
        });
      }

      function closePanel() {
        panel.classList.remove('is-open');
        allPersonButtons().forEach(function (b) {
          b.setAttribute('aria-pressed', 'false');
        });
      }

      panel.addEventListener('transitionend', function (e) {
        if (e.propertyName !== 'transform') return;
        if (!panel.classList.contains('is-open')) {
          panel.hidden = true;
        }
      });

      closeBtn.addEventListener('click', closePanel);

      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.hotspots .person');
        if (!btn) return;
        allPersonButtons().forEach(function (b) {
          b.setAttribute('aria-pressed', 'false');
        });
        btn.setAttribute('aria-pressed', 'true');
        openPanel(personSentence(btn));
      });
    })();
  </script>
</body>
</html>
