<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proyecto</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.94);
      --accent: #1a6b4a;
      --text: #1a1a1a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text);
      background: #0d3d2a;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .scene-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .hotspots {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Clickable dots on top of the full scene image (one PNG with everyone already drawn) */
    .hotspot {
      pointer-events: auto;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1.1rem;
      height: 1.1rem;
      margin: 0;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      background: rgba(26, 107, 74, 0.88);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .hotspot:focus,
    .hotspot:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5), 0 2px 8px rgba(0, 0, 0, 0.45);
    }

    .hotspot:hover {
      transform: translate(-50%, -50%) scale(1.25);
      background: rgba(32, 130, 90, 0.95);
    }

    .hotspot[aria-pressed="true"] {
      background: rgba(212, 168, 75, 0.95);
      border-color: #fff8e7;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    #sentence-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 15;
      max-height: 42vh;
      overflow-y: auto;
      padding: 1rem 1rem 1.25rem;
      background: var(--panel-bg);
      border-top: 3px solid var(--accent);
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.12);
      transform: translateY(100%);
      transition: transform 0.28s ease;
    }

    #sentence-panel.is-open {
      transform: translateY(0);
    }

    #sentence-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: var(--accent);
    }

    #sentence-panel .row {
      margin: 0.75rem 0 0;
      line-height: 1.55;
    }

    #text-sentence {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #text-sentence .sentence-line {
      margin: 0;
      padding: 0 0 1rem;
      border-bottom: 1px solid #d8e5df;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    #text-sentence .sentence-line:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    #sentence-panel .close {
      position: absolute;
      top: 0.5rem;
      right: 0.65rem;
      border: none;
      background: transparent;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      color: #444;
      padding: 0.25rem 0.5rem;
    }

    #sentence-panel .close:hover {
      color: #000;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene" role="region" aria-label="Escena">
    <img class="scene-bg" src="assets/Copilot_20260422_015831.png" width="1920" height="1080" alt="Fondo del proyecto">
    <div class="hotspots" id="hotspots">
      <!-- Dots: left % / top % = center of the dot. -->
      <!-- Dot | left 53%, top 27.3% -->
      <button type="button" class="hotspot" style="left:53%; top:27.3%;" data-sentence="La maestra que habla enseña la lección. La persona de quien aprendemos sabe mucho."></button>
      <!-- Dot | left 56.9%, top 50.4% -->
      <button type="button" class="hotspot" style="left:56.9%; top:50.4%;" data-sentence="El estudiante que escribe usa un lápiz."></button>
      <!-- Dot | left 94.2%, top 82.4% -->
      <button type="button" class="hotspot" style="left:94.2%; top:82.4%;" data-sentence="El libro que leo está en la mesa"></button>
      <!-- Dot | left 41.2%, top 51.8% -->
      <button type="button" class="hotspot" style="left:41.2%; top:51.8%;" data-sentence="La computadora que usamos tiene la tarea"></button>
      <!-- Dot | left 64.9%, top 47.1% -->
      <button type="button" class="hotspot" style="left:64.9%; top:47.1%;" data-sentence="Los alumnos que estudian sacan buenas notas"></button>
      <!-- Dot | left 20.2%, top 41.4% -->
      <button type="button" class="hotspot" style="left:20.2%; top:41.4%;" data-sentence="El examen que hacemos es difícil"></button>
      <!-- Dot | left 9.9%, top 72.6% -->
      <button type="button" class="hotspot" style="left:9.9%; top:72.6%;" data-sentence="El profesor con quien hablamos es amable"></button>
      <!-- Dot | left 48.5%, top 76.7% -->
      <button type="button" class="hotspot" style="left:48.5%; top:76.7%;" data-sentence="La chica a quien ayudamos sonríe"></button>
      <!-- Dot | left 60%, top 51.8% -->
      <button type="button" class="hotspot" style="left:60%; top:51.8%;" data-sentence="El amigo con quien estudio comparte su libro"></button>
      <!-- Dot | left 79.7%, top 79.7% -->
      <button type="button" class="hotspot" style="left:79.7%; top:79.7%;" data-sentence="El estudiante para quien preparo los apuntes estudia"></button>
      <!-- Dot | left 84.9%, top 56.2% -->
      <button type="button" class="hotspot" style="left:84.9%; top:56.2%;" data-sentence="La maestra a quien miro escribe en la pizarra."></button>
    </div>
  </div>

  <aside id="sentence-panel" aria-labelledby="panel-heading" hidden>
    <button type="button" class="close" id="panel-close" aria-label="Cerrar">&times;</button>
    <h2 id="panel-heading">Oración</h2>
    <div class="row" id="sentence-block"><div id="text-sentence"></div></div>
  </aside>

  <script>
    (function () {
      function imageCandidates(src) {
        if (!src || src.indexOf('data:') === 0 || /^(https?:)?\/\//i.test(src)) {
          return [src];
        }
        var clean = src.replace(/^\.\//, '');
        var name = clean.replace(/^.*\//, '');
        var out = [];
        function add(u) {
          if (u && out.indexOf(u) === -1) out.push(u);
        }
        add(src);
        add(clean);
        add('./' + clean);
        add('assets/' + name);
        add('Assets/' + name);
        add('ASSETS/' + name);
        add('./assets/' + name);
        add('./Assets/' + name);
        add('images/' + name);
        add('./images/' + name);
        add('img/' + name);
        add('./img/' + name);
        add(name);
        add('./' + name);
        return out;
      }

      function attachImageFallback(img) {
        var initial = img.getAttribute('src');
        if (!initial) return;
        var list = imageCandidates(initial);
        if (list.length <= 1) return;
        var idx = 0;
        function onImgErr() {
          idx += 1;
          if (idx < list.length) {
            img.src = list[idx];
          } else {
            img.removeEventListener('error', onImgErr);
          }
        }
        img.addEventListener('error', onImgErr);
      }

      document.querySelectorAll('img[src]').forEach(attachImageFallback);
    })();

    (function () {
      var panel = document.getElementById('sentence-panel');
      var sentenceEl = document.getElementById('text-sentence');
      var closeBtn = document.getElementById('panel-close');

      function allHotspots() {
        return document.querySelectorAll('.hotspots .hotspot');
      }

      function hotspotText(btn) {
        var s = btn.getAttribute('data-sentence');
        if (s != null && s !== '') return s;
        var legacy = btn.getAttribute('data-present') || '';
        var legPast = btn.getAttribute('data-past') || '';
        if (legPast) return legacy + (legacy ? '\n\n' : '') + legPast;
        return legacy;
      }

      function splitAfterTerminals(single) {
        var parts = [];
        var cur = '';
        for (var i = 0; i < single.length; i++) {
          cur += single[i];
          var ch = single[i];
          if (ch === '.' || ch === '!' || ch === '?') {
            var j = i + 1;
            while (j < single.length && single[j] === '.') {
              cur += single[j];
              j++;
            }
            i = j - 1;
            var rest = single.slice(j);
            if (rest.length === 0 || /^\s/.test(rest)) {
              if (cur.trim()) parts.push(cur.trim());
              cur = '';
              while (i + 1 < single.length && /\s/.test(single[i + 1])) i++;
            }
          }
        }
        if (cur.trim()) parts.push(cur.trim());
        return parts.filter(Boolean);
      }

      function splitIntoDisplaySentences(text) {
        var t = String(text == null ? '' : text).replace(/\r\n/g, '\n').trim();
        if (!t) return [];
        var byPara = t.split(/\n\s*\n/).map(function (x) {
          return x.replace(/\s+/g, ' ').trim();
        }).filter(Boolean);
        if (byPara.length > 1) return byPara;
        var single = byPara[0] || t.replace(/\s+/g, ' ').trim();
        var byStop = splitAfterTerminals(single);
        if (byStop.length > 1) return byStop;
        var byMi = single.split(/\s+(?=Mi\s+\S)/i).map(function (x) {
          return x.trim();
        }).filter(Boolean);
        if (byMi.length > 1) return byMi;
        return [single];
      }

      function openPanel(sentence) {
        sentenceEl.textContent = '';
        splitIntoDisplaySentences(sentence).forEach(function (chunk) {
          var line = document.createElement('p');
          line.className = 'sentence-line';
          line.textContent = chunk;
          sentenceEl.appendChild(line);
        });
        panel.hidden = false;
        requestAnimationFrame(function () {
          panel.classList.add('is-open');
        });
      }

      function closePanel() {
        panel.classList.remove('is-open');
        allHotspots().forEach(function (b) {
          b.setAttribute('aria-pressed', 'false');
        });
      }

      panel.addEventListener('transitionend', function (e) {
        if (e.propertyName !== 'transform') return;
        if (!panel.classList.contains('is-open')) {
          panel.hidden = true;
        }
      });

      closeBtn.addEventListener('click', closePanel);

      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.hotspots .hotspot');
        if (!btn) return;
        allHotspots().forEach(function (b) {
          b.setAttribute('aria-pressed', 'false');
        });
        btn.setAttribute('aria-pressed', 'true');
        openPanel(hotspotText(btn));
      });
    })();
  </script>
</body>
</html>
